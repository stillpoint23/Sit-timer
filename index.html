<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sit Timer v2</title>
<style>
:root{--bg1:#0d0d0b;--bg2:#1b1813;--card:rgba(246,238,219,.085);--text:#f5ecd9;--muted:#b9ad97;--line:rgba(245,236,217,.16);--accent:#d8b66f;--danger:#b86c5a}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,rgba(216,182,111,.13),transparent 34%),linear-gradient(180deg,var(--bg2),var(--bg1));color:var(--text)}
body{min-height:100vh;display:grid;place-items:center;padding:28px}
.timer{width:min(600px,100%);border:1px solid var(--line);border-radius:32px;background:var(--card);backdrop-filter:blur(10px);padding:34px;box-shadow:0 30px 90px rgba(0,0,0,.38)}
h1{margin:0 0 28px;text-align:center;font-size:1.25rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.duration{text-align:center;margin-bottom:24px}
#durationText{font-size:clamp(4rem,12vw,7rem);line-height:.95;font-weight:300;letter-spacing:-.08em}
.unit{display:block;margin-top:10px;color:var(--muted);font-size:1rem;letter-spacing:.08em;text-transform:uppercase}
input[type=range]{width:100%;margin:14px 0 18px;accent-color:var(--accent)}
.adjust{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:22px}
.quick{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:24px}
button{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);border-radius:999px;padding:12px 10px;font-size:.95rem;cursor:pointer}
button:hover{background:rgba(255,255,255,.10)}
button:active{transform:translateY(1px)}
.primary{background:var(--accent);color:#17130a;font-weight:700;border-color:transparent}
.primary:hover{background:#e2c078}
.danger{color:#ffd6cf;border-color:rgba(184,108,90,.55)}
.readouts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.readout,.stats{border:1px solid var(--line);border-radius:22px;padding:18px;text-align:center;background:rgba(0,0,0,.16)}
.label{color:var(--muted);font-size:.76rem;text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px}
.value{font-size:1.8rem;font-weight:300}
.controls{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin-bottom:18px}
.options{display:flex;justify-content:center;flex-wrap:wrap;gap:18px;color:var(--muted);font-size:.95rem;margin-bottom:18px}
label{display:inline-flex;gap:8px;align-items:center}
.stats{margin-top:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.small-value{font-size:1.35rem;font-weight:300}
.stats-actions{display:flex;gap:10px;justify-content:center;margin-top:14px}
.note{margin:22px 0 0;color:var(--muted);text-align:center;line-height:1.45;font-size:.88rem}
@media(max-width:520px){.timer{padding:24px;border-radius:24px}.quick{grid-template-columns:repeat(3,1fr)}.readouts{grid-template-columns:1fr}.controls{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="timer">
<h1>Sit Timer</h1>
<section class="duration"><div id="durationText">90</div><span class="unit">minutes</span></section>
<input id="durationSlider" type="range" min="0" max="300" step="1" value="90">
<div class="adjust">
<button data-adjust="-10">−10</button><button data-adjust="-5">−5</button><button data-adjust="-1">−1</button><button data-adjust="1">+1</button><button data-adjust="5">+5</button>
</div>
<div class="quick">
<button data-set="30">30</button><button data-set="45">45</button><button data-set="60">60</button><button data-set="90">90</button><button data-set="120">120</button><button data-set="180">180</button>
</div>
<section class="readouts">
<div class="readout"><div class="label">Ends at</div><div id="endAt" class="value">--:--</div></div>
<div class="readout"><div class="label">Remaining</div><div id="remaining" class="value">--:--</div></div>
</section>
<div class="controls"><button id="startPause" class="primary">Start</button><button id="reset">Reset</button><button id="testBell">Bell</button></div>
<div class="options">
<label><input id="openingBell" type="checkbox" checked> Opening bell</label>
<label><input id="closingBell" type="checkbox" checked> Closing bell</label>
<label><input id="autoLog" type="checkbox" checked> Save completed sits</label>
</div>
<section class="stats">
<div class="label">Practice total on this browser</div>
<div class="stats-grid">
<div><div class="label">Sessions</div><div id="sessionCount" class="small-value">0</div></div>
<div><div class="label">Total</div><div id="totalTime" class="small-value">0h 0m</div></div>
</div>
<div class="stats-actions"><button id="saveManual">Save this sit</button><button id="clearLog" class="danger">Clear log</button></div>
</section>
<p class="note">Duration changes by the minute up to 5 hours. End time updates immediately. Completed sits are saved only on this browser/device.</p>
</main>
<script>
const slider=document.getElementById("durationSlider"),durationText=document.getElementById("durationText"),endAt=document.getElementById("endAt"),remaining=document.getElementById("remaining"),startPause=document.getElementById("startPause"),reset=document.getElementById("reset"),testBell=document.getElementById("testBell"),openingBell=document.getElementById("openingBell"),closingBell=document.getElementById("closingBell"),autoLog=document.getElementById("autoLog"),sessionCount=document.getElementById("sessionCount"),totalTime=document.getElementById("totalTime"),saveManual=document.getElementById("saveManual"),clearLog=document.getElementById("clearLog");
let durationMin=Number(slider.value),running=false,paused=false,endTimeMs=null,remainingMs=durationMin*60000,tick=null,loggedThisRun=false;
const LOG_KEY="sitTimerPracticeLogV2";
function getLog(){try{return JSON.parse(localStorage.getItem(LOG_KEY))||[]}catch{return[]}}
function setLog(log){localStorage.setItem(LOG_KEY,JSON.stringify(log));renderStats()}
function addSession(minutes){if(!minutes||minutes<=0)return;const log=getLog();log.push({minutes:Number(minutes),completedAt:new Date().toISOString()});setLog(log)}
function renderStats(){const log=getLog();const mins=log.reduce((sum,s)=>sum+Number(s.minutes||0),0);const h=Math.floor(mins/60),m=mins%60;sessionCount.textContent=log.length;totalTime.textContent=`${h}h ${m}m`}
function clamp(n,min,max){return Math.min(max,Math.max(min,n))}
function formatClock(ms){return new Date(ms).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}
function formatRemaining(ms){const total=Math.max(0,Math.ceil(ms/1000)),h=Math.floor(total/3600),m=Math.floor((total%3600)/60),s=total%60;return h>0?`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`:`${m}:${String(s).padStart(2,"0")}`}
function renderPreview(){durationText.textContent=durationMin;const previewEnd=Date.now()+durationMin*60000;endAt.textContent=formatClock(previewEnd);remaining.textContent=formatRemaining(durationMin*60000)}
function renderRunning(){const left=Math.max(0,endTimeMs-Date.now());remaining.textContent=formatRemaining(left);endAt.textContent=formatClock(endTimeMs);durationText.textContent=durationMin;if(left<=0)finish()}
function render(){if(running)renderRunning();else if(paused)remaining.textContent=formatRemaining(remainingMs);else renderPreview()}
function setDuration(mins){durationMin=clamp(Number(mins),0,300);slider.value=durationMin;if(running){remainingMs=durationMin*60000;endTimeMs=Date.now()+remainingMs}else if(paused){remainingMs=durationMin*60000}render()}
function playBell(seconds=7.5){
const AudioContext=window.AudioContext||window.webkitAudioContext;if(!AudioContext)return;
const ctx=new AudioContext(),now=ctx.currentTime,master=ctx.createGain();
master.gain.setValueAtTime(.00001,now);master.gain.exponentialRampToValueAtTime(.78,now+.015);master.gain.exponentialRampToValueAtTime(.00001,now+seconds);master.connect(ctx.destination);
const partials=[{f:174.6,g:.42,d:seconds},{f:261.9,g:.22,d:seconds*.92},{f:349.2,g:.16,d:seconds*.84},{f:456.8,g:.10,d:seconds*.72},{f:612.4,g:.055,d:seconds*.62},{f:884.1,g:.028,d:seconds*.48}];
partials.forEach((p,i)=>{const osc=ctx.createOscillator(),gain=ctx.createGain();osc.type="sine";osc.frequency.setValueAtTime(p.f,now);osc.frequency.exponentialRampToValueAtTime(p.f*(1-.0015*(i+1)),now+p.d);gain.gain.setValueAtTime(.00001,now);gain.gain.exponentialRampToValueAtTime(p.g,now+.012+i*.004);gain.gain.exponentialRampToValueAtTime(.00001,now+p.d);osc.connect(gain);gain.connect(master);osc.start(now);osc.stop(now+p.d+.2)});
const bufferSize=ctx.sampleRate*.09,buffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate),data=buffer.getChannelData(0);
for(let i=0;i<bufferSize;i++){data[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.018))}
const noise=ctx.createBufferSource(),noiseGain=ctx.createGain();noise.buffer=buffer;noiseGain.gain.setValueAtTime(.08,now);noiseGain.gain.exponentialRampToValueAtTime(.00001,now+.08);noise.connect(noiseGain);noiseGain.connect(master);noise.start(now);noise.stop(now+.1);
setTimeout(()=>ctx.close(),(seconds+.5)*1000)}
function start(){if(durationMin<=0)return;running=true;paused=false;loggedThisRun=false;remainingMs=durationMin*60000;endTimeMs=Date.now()+remainingMs;startPause.textContent="Pause";if(openingBell.checked)playBell(5.8);tick=setInterval(render,250);render()}
function pause(){running=false;paused=true;remainingMs=Math.max(0,endTimeMs-Date.now());clearInterval(tick);tick=null;startPause.textContent="Resume";remaining.textContent=formatRemaining(remainingMs)}
function resume(){running=true;paused=false;endTimeMs=Date.now()+remainingMs;startPause.textContent="Pause";tick=setInterval(render,250);render()}
function finish(){clearInterval(tick);tick=null;running=false;paused=false;startPause.textContent="Start";if(autoLog.checked&&!loggedThisRun){addSession(durationMin);loggedThisRun=true}if(closingBell.checked)playBell(8.5);renderPreview()}
function resetTimer(){clearInterval(tick);tick=null;running=false;paused=false;remainingMs=durationMin*60000;startPause.textContent="Start";renderPreview()}
slider.addEventListener("input",()=>setDuration(slider.value));
document.querySelectorAll("[data-set]").forEach(btn=>btn.addEventListener("click",()=>setDuration(btn.dataset.set)));
document.querySelectorAll("[data-adjust]").forEach(btn=>btn.addEventListener("click",()=>setDuration(durationMin+Number(btn.dataset.adjust))));
startPause.addEventListener("click",()=>{if(running)pause();else if(paused)resume();else start()});
reset.addEventListener("click",resetTimer);testBell.addEventListener("click",()=>playBell(8));saveManual.addEventListener("click",()=>addSession(durationMin));
clearLog.addEventListener("click",()=>{if(confirm("Clear all saved practice totals on this browser?"))setLog([])});
renderPreview();renderStats();
</script>
</body>
</html>
